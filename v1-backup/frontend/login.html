
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ClinicFlow</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">🏥 ClinicFlow</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="card auth-card">
            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">Đăng nhập để đặt lịch và quản lý hồ sơ của bạn</p>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <div id="login-error" class="error-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:1rem;">Đăng nhập</button>
            </form>
            <p style="text-align:center;margin-top:1.5rem;">
                Chưa có tài khoản? <a href="register.html" style="color:var(--color-primary);font-weight:500;">Đăng ký</a>
            </p>
            <p style="text-align:center;margin-top:0.5rem;font-size:0.875rem;color:var(--color-gray-500);">
                Admin: admin@clinicflow.com / admin123
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const error = document.getElementById('login-error');

            try {
                const result = await api.login(email, password);
                UI.showToast("Dang nhap thanh cong!", "success");
                if (result.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'patient.html';
                }
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
