
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicFlow - Đặt lịch khám bệnh trực tuyến</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                🏥 ClinicFlow
            </a>
            <div class="navbar-nav">
                <a href="index.html" class="navbar-link active">Trang chủ</a>
                <a href="patient.html" class="navbar-link">Bệnh nhân</a>
                <a href="admin.html" class="navbar-link">Quản trị</a>
            </div>
            <div class="navbar-user">
                <a href="login.html" class="btn btn-primary btn-sm">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <div>
                <h1 class="hero-title">Đặt lịch khám bệnh<br>dễ dàng, nhanh chóng</h1>
                <p class="hero-subtitle">
                    Chọn bác sĩ, chọn thời gian, đặt lịch chỉ trong vài phút. Không cần đợi, không cần xếp hàng!
                </p>
                <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                    <a href="#doctors" class="btn btn-primary">Đặt lịch ngay</a>
                    <a href="login.html" class="btn btn-secondary">Tạo tài khoản</a>
                </div>
            </div>
            <div style="text-align:center;">
                <span style="font-size:8rem;">👨‍⚕️</span>
            </div>
        </div>
    </section>

    <!-- Danh sách bác sĩ -->
    <section class="container" id="doctors">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;">
            <h2>Đội ngũ bác sĩ</h2>
            <select id="specialty-filter" class="form-input" style="max-width:200px;">
            </select>
        </div>
        <div class="doctor-grid" id="doctor-grid">
            <!-- Doctor cards rendered here -->
        </div>
    </section>

    <!-- Modal đặt lịch -->
    <div class="modal-overlay" id="booking-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>Đặt lịch khám</h3>
                <button class="modal-close" onclick="UI.closeModal('booking-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-doctor-info" style="margin-bottom:1.5rem;"></div>
                <div class="form-group">
                    <label class="form-label">Ngày khám</label>
                    <input type="date" id="booking-date" class="form-input" onchange="Doctor.onDateChange()">
                </div>
                <div id="time-slots-container"></div>
                <div class="form-group" style="margin-top:1rem;">
                    <label class="form-label">Lý do khám (tùy chọn)</label>
                    <textarea id="booking-reason" class="form-input" rows="3" placeholder="Mô tả triệu chứng của bạn..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="UI.closeModal('booking-modal')">Hủy</button>
                <button class="btn btn-primary" onclick="Doctor.confirmBooking()">Xác nhận đặt lịch</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/doctor.js"></script>
    <script src="js/appointment.js"></script>
    <script>
        // Khởi tạo trang
        document.addEventListener('DOMContentLoaded', () => {
            // Cập nhật navbar
            const user = api.getCurrentUser();
            if (user) {
                UI.updateNavbar(user);
            }

            // Render bác sĩ
            Doctor.renderSpecialtySelect('specialty-filter');
            Doctor.renderGrid('doctor-grid');
            
            // Lọc theo chuyên khoa
            document.getElementById('specialty-filter').addEventListener('change', (e) => {
                Doctor.renderGrid('doctor-grid', e.target.value);
            });
        });
    </script>
</body>
</html>
