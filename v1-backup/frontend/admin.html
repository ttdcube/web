
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - ClinicFlow</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">🏥 ClinicFlow</a>
            <div class="navbar-nav">
                <a href="index.html" class="navbar-link">Trang chủ</a>
                <a href="admin.html" class="navbar-link active">Quản trị</a>
            </div>
            <div class="navbar-user">
                <span>Xin chào, Admin</span>
                <button class="btn btn-secondary btn-sm" id="logout-btn">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="#" class="sidebar-link active">📊 Tổng quan</a>
                <a href="#" class="sidebar-link">👤 Người dùng</a>
                <a href="#" class="sidebar-link">👨‍⚕️ Bác sĩ</a>
                <a href="#" class="sidebar-link">📅 Lịch hẹn</a>
            </div>
        </aside>

        <main class="admin-content">
            <h2 style="margin-bottom:2rem;">Bảng điều khiển</h2>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="card stat-card">
                    <div class="stat-value" id="stat-users">0</div>
                    <div class="stat-label">Người dùng</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-doctors">0</div>
                    <div class="stat-label">Bác sĩ</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-value" id="stat-appointments">0</div>
                    <div class="stat-label">Lịch hẹn</div>
                </div>
            </div>

            <!-- Danh sách lịch hẹn -->
            <div class="card" style="margin-top:2rem;">
                <h3 style="margin-bottom:1.5rem;">Tất cả lịch hẹn</h3>
                <div id="admin-appointments"></div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/appointment.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.getCurrentUser();
            if (!user || user.role !== 'admin') {
                UI.showToast("Ban khong co quyen truy cap!", "error");
                window.location.href = "index.html";
                return;
            }

            UI.updateNavbar(user);

            try {
                // Render stats
                const stats = await api.getAdminStats();
                document.getElementById('stat-users').textContent = stats.userCount;
                document.getElementById('stat-doctors').textContent = stats.doctorCount;
                document.getElementById('stat-appointments').textContent = stats.appointmentCount;

                Appointment.renderAdminList('admin-appointments');
            } catch (err) {
                UI.showToast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
