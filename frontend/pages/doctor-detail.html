
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bác sĩ - ClinicFlow</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-brand">🏥 ClinicFlow</a>
      <div class="navbar-nav">
        <a href="../index.html" class="navbar-link">Trang chủ</a>
        <a href="./doctors.html" class="navbar-link active">Bác sĩ</a>
      </div>
      <div class="navbar-user">
        <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
        <a href="./login.html" class="btn btn-primary btn-sm">Đăng nhập</a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding:2rem 1rem">
    <div id="doctor-detail-container"></div>
  </div>

  <div class="modal-overlay" id="booking-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Đặt lịch khám</h3>
        <button class="modal-close" onclick="UI.closeModal('booking-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center; margin-bottom:1.5rem; padding:1rem; background-color:var(--bg-secondary); border-radius:var(--radius-md)">
          <h4 id="booking-doctor-name" style="margin-bottom:0.25rem"></h4>
          <p id="booking-doctor-specialty" style="color:var(--color-primary); font-weight:500; margin-bottom:0.25rem"></p>
          <p id="booking-doctor-price" style="font-weight:700"></p>
        </div>
        <div class="form-group">
          <label class="form-label">Ngày khám</label>
          <input type="date" id="booking-date" class="form-input" onchange="Doctors.onDateChange(this)">
        </div>
        <div id="booking-time-slots"></div>
        <div class="form-group" style="margin-top:1rem">
          <label class="form-label">Lý do khám (tùy chọn)</label>
          <textarea id="booking-reason" class="form-textarea" placeholder="Mô tả triệu chứng của bạn..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="UI.closeModal('booking-modal')">Hủy</button>
        <button class="btn btn-primary" onclick="Doctors.confirmBooking()">Xác nhận đặt lịch</button>
      </div>
    </div>
  </div>

  <footer class="footer" style="margin-top:4rem">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3 style="font-size:1.5rem; font-weight:700; color:var(--color-primary); margin-bottom:1rem">🏥 ClinicFlow</h3>
          <p class="text-muted">Nền tảng đặt lịch khám bệnh trực tuyến hiện đại.</p>
        </div>
        <div class="footer-section">
          <h4 style="font-weight:600; margin-bottom:1rem">Liên kết</h4>
          <ul style="list-style:none; display:flex; flex-direction:column; gap:0.5rem">
            <li><a href="../index.html">Trang chủ</a></li>
            <li><a href="./doctors.html">Bác sĩ</a></li>
          </ul>
        </div>
        <div class="footer-section">
          <h4 style="font-weight:600; margin-bottom:1rem">Liên hệ</h4>
          <ul style="list-style:none; display:flex; flex-direction:column; gap:0.5rem; color:var(--text-muted)">
            <li>📞 1900 1234</li>
            <li>📧 info@clinicflow.com</li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p class="text-muted">&copy; 2026 ClinicFlow. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/storage.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../js/features/doctors.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      const storedVersion = localStorage.getItem(Storage.KEYS.SEED_VERSION);
      if (storedVersion !== Storage.SEED_VERSION) {
        SeedData.run();
        localStorage.setItem(Storage.KEYS.SEED_VERSION, Storage.SEED_VERSION);
      }
      UI.initTheme();
      UI.initModals();

      const user = Auth.getCurrentUser();
      if (user) {
        const navbarUser = document.querySelector('.navbar-user');
        if (navbarUser) {
          navbarUser.innerHTML = `
            <button id="theme-toggle" class="btn btn-secondary btn-sm">${Storage.getTheme() === 'dark' ? '☀️' : '🌙'}</button>
            <a href="${user.role === 'admin' ? 'admin/index.html' : 'patient/index.html'}" class="btn btn-primary btn-sm">Dashboard</a>
          `;
          document.getElementById('theme-toggle').addEventListener('click', () => UI.toggleTheme());
        }
      }

      const urlParams = new URLSearchParams(window.location.search);
      const doctorId = urlParams.get('id');
      const container = document.getElementById('doctor-detail-container');

      if (!doctorId) {
        UI.showEmpty('doctor-detail-container', 'Không tìm thấy bác sĩ', '👨⚕️');
        return;
      }

      const doctor = Storage.getDoctorById(doctorId);
      if (!doctor) {
        UI.showEmpty('doctor-detail-container', 'Không tìm thấy bác sĩ', '👨⚕️');
        return;
      }

      container.innerHTML = `
        <div class="card" style="margin-bottom:2rem">
          <div style="display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap">
            <img src="${doctor.avatar}" alt="${doctor.fullName}" style="width:200px; height:200px; border-radius:50%; object-fit:cover; border:4px solid var(--border-color)">
            <div style="flex:1; min-width:280px">
              <h2 style="font-size:1.75rem; font-weight:700; margin-bottom:0.5rem">${doctor.fullName}</h2>
              <p style="color:var(--color-primary); font-size:1.125rem; font-weight:600; margin-bottom:0.5rem">${doctor.specialty}</p>
              <div style="display:flex; gap:1rem; margin-bottom:1rem; flex-wrap:wrap">
                <span style="display:flex; align-items:center; gap:0.25rem"><span style="color:#f39c12">★</span>${doctor.rating || 5.0} (${doctor.reviewCount || 120} đánh giá)</span>
                <span style="color:var(--text-muted)">${doctor.experience || '10'} năm kinh nghiệm</span>
              </div>
              <div style="display:flex; gap:0.75rem; flex-wrap:wrap">
                <button class="btn btn-primary btn-lg" onclick="Doctors.openBookingModal('${doctor.id}')">Đặt lịch khám</button>
                <button class="btn btn-secondary btn-lg" onclick="window.location.href='./doctors.html'">Quay lại</button>
              </div>
            </div>
          </div>
        </div>
        <div class="card" style="margin-bottom:2rem">
          <h3 style="margin-bottom:1rem; font-weight:700">Giới thiệu</h3>
          <p style="color:var(--text-muted); line-height:1.8">${doctor.bio}</p>
        </div>
        <div class="card">
          <h3 style="margin-bottom:1rem; font-weight:700">Đánh giá từ bệnh nhân</h3>
          <div class="card" style="margin-bottom:1rem">
            <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem">
              <div style="width:40px; height:40px; border-radius:50%; background:var(--color-primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:700">NV</div>
              <div>
                <div style="font-weight:600">Nguyễn Văn A</div>
                <div style="font-size:0.875rem; color:var(--text-muted)">Ngày khám: 15/05/2026</div>
              </div>
              <span style="margin-left:auto; color:#f39c12">★★★★★</span>
            </div>
            <p style="color:var(--text-muted)">Bác sĩ rất nhiệt tình và chuyên môn, tôi cảm thấy rất hài lòng với dịch vụ này!</p>
          </div>
          <div class="card">
            <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem">
              <div style="width:40px; height:40px; border-radius:50%; background:var(--color-secondary); color:white; display:flex; align-items:center; justify-content:center; font-weight:700">TT</div>
              <div>
                <div style="font-weight:600">Trần Thị B</div>
                <div style="font-size:0.875rem; color:var(--text-muted)">Ngày khám: 10/05/2026</div>
              </div>
              <span style="margin-left:auto; color:#f39c12">★★★★★</span>
            </div>
            <p style="color:var(--text-muted)">Mọi thứ đều tuyệt vời, dịch vụ nhanh chóng và tiện lợi!</p>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
