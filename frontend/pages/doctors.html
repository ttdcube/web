
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách bác sĩ - ClinicFlow</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../index.html" class="navbar-brand">🏥 ClinicFlow</a>
      <div class="navbar-nav">
        <a href="../index.html" class="navbar-link">Trang chủ</a>
        <a href="doctors.html" class="navbar-link active">Bác sĩ</a>
      </div>
      <div class="navbar-user">
        <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
        <a href="login.html" class="btn btn-primary btn-sm">Đăng nhập</a>
      </div>
    </div>
  </nav>

  <section class="container" style="padding:3rem 1rem">
    <div class="section-header">
      <h2 class="section-title">Đội ngũ bác sĩ</h2>
      <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap">
        <input type="text" id="doctor-search" class="form-input" placeholder="Tìm kiếm bác sĩ..." style="max-width:250px">
        <select id="specialty-filter" class="form-select" style="max-width:200px"></select>
      </div>
    </div>
    <div class="doctors-grid" id="doctors-grid"></div>
    <div id="doctors-grid-pagination"></div>
  </section>

  <div class="modal-overlay" id="booking-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Đặt lịch khám</h3>
        <button class="modal-close" onclick="UI.closeModal('booking-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center; margin-bottom:1.5rem; padding:1rem; background-color:var(--bg-secondary); border-radius:var(--radius-md)">
          <h4 id="booking-doctor-name" style="margin-bottom:0.25rem"></h4>
          <p id="booking-doctor-specialty" style="color:var(--color-primary); font-weight:500; margin-bottom:0.25rem"></p>
          <p id="booking-doctor-price" style="font-weight:700"></p>
        </div>

        <div class="form-group">
          <label class="form-label">Ngày khám</label>
          <input type="date" id="booking-date" class="form-input" onchange="Doctors.onDateChange(this)">
        </div>

        <div id="booking-time-slots"></div>

        <div class="form-group" style="margin-top:1rem">
          <label class="form-label">Lý do khám (tùy chọn)</label>
          <textarea id="booking-reason" class="form-textarea" placeholder="Mô tả triệu chứng của bạn..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="UI.closeModal('booking-modal')">Hủy</button>
        <button class="btn btn-primary" onclick="Doctors.confirmBooking()">Xác nhận đặt lịch</button>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/storage.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../js/features/doctors.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();
      UI.initModals();

      const user = Auth.getCurrentUser();
      if (user) {
        const navbarUser = document.querySelector('.navbar-user');
        if (navbarUser) {
          navbarUser.innerHTML = `
            <button id="theme-toggle" class="btn btn-secondary btn-sm">${Storage.getTheme() === 'dark' ? '☀️' : '🌙'}</button>
            <a href="${user.role === 'admin' ? 'admin/index.html' : 'patient/index.html'}" class="btn btn-primary btn-sm">Dashboard</a>
          `;
          document.getElementById('theme-toggle').addEventListener('click', () => UI.toggleTheme());
        }
      }

      Doctors.renderSpecialtyFilter('specialty-filter');
      Doctors.renderGrid('doctors-grid');

      const searchInput = document.getElementById('doctor-search');
      if (searchInput) {
        let searchTimeout;
        searchInput.addEventListener('input', function() {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            Doctors.filters.search = this.value;
            Doctors.currentPage = 1;
            Doctors.renderGrid('doctors-grid');
          }, 300);
        });
      }

      const specialtyFilter = document.getElementById('specialty-filter');
      if (specialtyFilter) {
        specialtyFilter.addEventListener('change', function() {
          Doctors.filters.specialty = this.value;
          Doctors.currentPage = 1;
          Doctors.renderGrid('doctors-grid');
        });
      }
    });
  </script>
</body>
</html>
