
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Appointments - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link active">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Quản lý lịch khám</h1>
        <p>Xem và cập nhật các cuộc hẹn</p>
      </div>

      <div class="card" style="margin-bottom:1.5rem">
        <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap">
          <select id="filter-status" class="form-select" style="max-width:200px">
            <option value="All">Tất cả trạng thái</option>
            <option value="pending">Chờ xác nhận</option>
            <option value="confirmed">Đã xác nhận</option>
            <option value="completed">Hoàn thành</option>
            <option value="cancelled">Đã hủy</option>
          </select>
          <input type="date" id="filter-date" class="form-input" style="max-width:200px">
          <input type="text" id="search-patient" class="form-input" placeholder="Tìm kiếm bệnh nhân..." style="flex:1; min-width:200px">
        </div>
      </div>

      <div id="doctor-appointments-list"></div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/doctor-appointments.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      DoctorAppointments.render();

      document.getElementById('filter-status').addEventListener('change', DoctorAppointments.render);
      document.getElementById('filter-date').addEventListener('change', DoctorAppointments.render);
      let searchTimeout;
      document.getElementById('search-patient').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(DoctorAppointments.render, 300);
      });

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
