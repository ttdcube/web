
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Patients - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link active">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Danh sách bệnh nhân</h1>
        <p>Xem hồ sơ và lịch sử khám</p>
      </div>

      <div class="card" style="margin-bottom:1.5rem">
        <input type="text" id="search-patient" class="form-input" placeholder="Tìm kiếm bệnh nhân...">
      </div>

      <div id="doctor-patients-list"></div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/doctor-patients.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      DoctorPatients.render();

      let searchTimeout;
      document.getElementById('search-patient').addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(DoctorPatients.render, 300);
      });

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
