
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link active">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Hồ sơ cá nhân</h1>
        <p>Cập nhật thông tin bác sĩ</p>
      </div>

      <div class="card" style="max-width:700px;">
        <form id="profile-form">
          <div style="text-align:center; margin-bottom:2rem;">
            <img id="profile-avatar" src="" alt="" style="width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:1rem;">
            <h3 id="profile-name"></h3>
          </div>

          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input type="text" id="fullName" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Chuyên khoa</label>
            <input type="text" id="specialty" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" id="phone" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Giới thiệu</label>
            <textarea id="bio" class="form-textarea" rows="4"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Giá khám</label>
            <input type="number" id="price" class="form-input" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Lưu thay đổi</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/doctor-profile.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      DoctorProfile.render();

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
