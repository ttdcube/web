
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ cá nhân - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="index.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="profile.html" class="sidebar-link active">👤 Hồ sơ cá nhân</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Hồ sơ cá nhân</h1>
        <p>Chỉnh sửa thông tin cá nhân của bạn</p>
      </div>

      <div class="card" style="max-width:700px">
        <div style="text-align:center; margin-bottom:2rem">
          <img id="profile-avatar" src="" alt="" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:1rem">
          <h3 id="profile-name"></h3>
        </div>

        <form id="profile-form">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input type="text" id="profile-fullname" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input type="tel" id="profile-phone" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Ngày sinh</label>
            <input type="date" id="profile-birthdate" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Giới tính</label>
            <select id="profile-gender" class="form-select">
              <option value="other">Khác</option>
              <option value="male">Nam</option>
              <option value="female">Nữ</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Nhóm máu</label>
            <select id="profile-bloodtype" class="form-select">
              <option value="unknown">Chưa biết</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="AB">AB</option>
              <option value="O">O</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Tiền sử dụng thuốc/dị ứng</label>
            <textarea id="profile-allergies" class="form-textarea" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Lịch sử bệnh án</label>
            <textarea id="profile-history" class="form-textarea" rows="3"></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Lưu thay đổi</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const patient = Auth.getCurrentPatient();
      if (!patient) return;

      document.getElementById('topbar-name').textContent = patient.fullName;
      document.getElementById('topbar-avatar').src = patient.avatar;
      document.getElementById('profile-name').textContent = patient.fullName;
      document.getElementById('profile-avatar').src = patient.avatar;
      document.getElementById('profile-fullname').value = patient.fullName;
      document.getElementById('profile-phone').value = patient.phone;
      document.getElementById('profile-birthdate').value = patient.birthDate;
      document.getElementById('profile-gender').value = patient.gender;
      document.getElementById('profile-bloodtype').value = patient.bloodType;
      document.getElementById('profile-allergies').value = patient.allergies;
      document.getElementById('profile-history').value = patient.medicalHistory;

      document.getElementById('profile-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const updates = {
          fullName: document.getElementById('profile-fullname').value,
          phone: document.getElementById('profile-phone').value,
          birthDate: document.getElementById('profile-birthdate').value,
          gender: document.getElementById('profile-gender').value,
          bloodType: document.getElementById('profile-bloodtype').value,
          allergies: document.getElementById('profile-allergies').value,
          medicalHistory: document.getElementById('profile-history').value
        };
        Storage.updatePatient(patient.id, updates);
        UI.toast('Cập nhật hồ sơ thành công!', 'success');
        document.getElementById('profile-name').textContent = updates.fullName;
        document.getElementById('topbar-name').textContent = updates.fullName;
      });

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
