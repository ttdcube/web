
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Schedules - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .schedule-week {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .day-card {
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .day-card.selected {
      border-color: var(--color-primary);
    }
    .day-header {
      padding: 0.75rem;
      background: var(--bg-secondary);
      font-weight: 600;
      text-align: center;
    }
    .day-card.selected .day-header {
      background: var(--color-primary);
      color: white;
    }
    .day-body {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .time-slot {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .time-slot input[type="time"] {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-color);
      color: var(--text-color);
    }
    .btn-small {
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem;
    }
    .btn-danger {
      background: var(--color-danger);
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link active">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Lịch làm việc</h1>
        <p>Cập nhật thời gian khám từng ngày</p>
      </div>

      <div class="card" style="margin-bottom:1rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;">
          <h3 style="margin:0;">Lịch tuần</h3>
          <div style="display:flex; gap:0.5rem;">
            <button class="btn btn-secondary" onclick="DoctorSchedules.copyToAll()">📋 Sao chép thời gian</button>
            <button class="btn btn-primary" onclick="DoctorSchedules.saveSchedules()">💾 Lưu thay đổi</button>
          </div>
        </div>
        
        <div class="schedule-week" id="schedule-week"></div>
      </div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/doctor-schedules.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      DoctorSchedules.init();

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
