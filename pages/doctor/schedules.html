
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Schedules - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link active">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Lịch làm việc</h1>
        <p>Cập nhật thời gian khám</p>
      </div>

      <div class="card" style="max-width:600px;">
        <form id="schedule-form">
          <div class="form-group">
            <label class="form-label">Ngày làm việc</label>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-2" value="2"> Thứ 2
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-3" value="3"> Thứ 3
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-4" value="4"> Thứ 4
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-5" value="5"> Thứ 5
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-6" value="6"> Thứ 6
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-7" value="7"> Thứ 7
              </label>
              <label style="display:flex; align-items:center; gap:0.25rem; cursor:pointer;">
                <input type="checkbox" id="day-1" value="1"> Chủ nhật
              </label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Giờ bắt đầu</label>
            <input type="time" id="startTime" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Giờ kết thúc</label>
            <input type="time" id="endTime" class="form-input" required>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Lưu thay đổi</button>
        </form>
      </div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/doctor-schedules.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      DoctorSchedules.render();

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });
  </script>
</body>
</html>
