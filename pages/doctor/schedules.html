
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch làm việc - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <style>
    .schedule-container {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .schedule-header {
      background: var(--color-primary);
      color: white;
      padding: 0.75rem;
      text-align: center;
      border-radius: var(--radius-md);
      font-weight: 600;
    }
    .time-label {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .day-slot {
      height: 50px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-weight: 500;
    }
    .day-slot:hover {
      border-color: var(--color-primary);
    }
    .day-slot.active {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }
    @media (max-width: 1024px) {
      .schedule-container {
        grid-template-columns: 60px repeat(7, minmax(80px, 1fr));
        gap: 0.5rem;
      }
      .time-label, .day-slot {
        height: 40px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../../index.html" style="font-size:1.25rem; font-weight:700; color:var(--color-primary)">🏥 ClinicFlow</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <div class="topbar-user">
        <img id="topbar-avatar" src="" alt="" class="topbar-avatar">
        <span id="topbar-name" class="topbar-name"></span>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="dashboard.html" class="sidebar-link">📊 Tổng quan</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch khám</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="profile.html" class="sidebar-link">👤 Hồ sơ</a>
        <a href="schedules.html" class="sidebar-link active">🕒 Lịch làm việc</a>
      </div>
    </aside>

    <main class="dashboard-content" style="max-width: 1400px; width: 100%;">
      <div class="dashboard-header" style="flex-wrap: wrap; gap: 1rem;">
        <div>
          <h1>Lịch làm việc</h1>
          <p>Chọn các khung giờ làm việc của bạn</p>
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-secondary" onclick="toggleAllDays(true)">✅ Chọn tất cả</button>
          <button class="btn btn-secondary" onclick="toggleAllDays(false)">❌ Bỏ chọn tất cả</button>
          <button class="btn btn-primary" onclick="saveSchedule()">💾 Lưu lịch</button>
        </div>
      </div>

      <div class="card" style="padding: 1.5rem;">
        <div class="schedule-container" id="scheduleGrid"></div>
      </div>
    </main>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script>
    const days = [
      { id: 2, name: 'Thứ 2' },
      { id: 3, name: 'Thứ 3' },
      { id: 4, name: 'Thứ 4' },
      { id: 5, name: 'Thứ 5' },
      { id: 6, name: 'Thứ 6' },
      { id: 7, name: 'Thứ 7' },
      { id: 1, name: 'Chủ nhật' }
    ];
    const timeSlots = [
      { start: '07:00', end: '08:00' },
      { start: '08:00', end: '09:00' },
      { start: '09:00', end: '10:00' },
      { start: '10:00', end: '11:00' },
      { start: '11:00', end: '12:00' },
      { start: '14:00', end: '15:00' },
      { start: '15:00', end: '16:00' },
      { start: '16:00', end: '17:00' },
      { start: '17:00', end: '18:00' },
      { start: '18:00', end: '19:00' }
    ];
    let scheduleData = {};

    document.addEventListener('DOMContentLoaded', function() {
      Storage.init();
      UI.initTheme();

      if (!Auth.isAuthenticated()) {
        UI.toast('Vui lòng đăng nhập để tiếp tục', 'warning');
        window.location.href = '../login.html';
        return;
      }

      const doctor = Auth.getCurrentDoctor();
      if (!doctor) {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../index.html';
        return;
      }

      document.getElementById('topbar-name').textContent = doctor.fullName;
      document.getElementById('topbar-avatar').src = doctor.avatar;

      initSchedule(doctor);
      renderSchedule();

      document.getElementById('logout-btn').addEventListener('click', function() {
        Auth.logout();
      });
    });

    function initSchedule(doctor) {
      if (doctor.schedules) {
        scheduleData = JSON.parse(JSON.stringify(doctor.schedules));
      } else {
        scheduleData = {};
        const activeDays = doctor.availableDays || [2,3,4,5,6];
        const start = doctor.availableTimeStart || '08:00';
        const end = doctor.availableTimeEnd || '17:00';
        
        days.forEach(day => {
          scheduleData[day.id] = {
            enabled: activeDays.includes(day.id),
            slots: timeSlots.filter(t => t.start >= start && t.end <= end).map(t => t.start + '-' + t.end)
          };
        });
      }
    }

    function renderSchedule() {
      const container = document.getElementById('scheduleGrid');
      let html = '';
      
      // Add headers
      html += '<div class="schedule-header" style="background: transparent;"></div>';
      days.forEach(day => {
        html += `<div class="schedule-header">${day.name}</div>`;
      });
      
      // Add time slots
      timeSlots.forEach(time => {
        const timeKey = time.start + '-' + time.end;
        html += `<div class="time-label">${time.start}</div>`;
        days.forEach(day => {
          const isActive = scheduleData[day.id]?.slots?.includes(timeKey);
          html += `
            <div class="day-slot ${isActive ? 'active' : ''}" 
                 onclick="toggleSlot(${day.id}, '${timeKey}')">
              ✓
            </div>
          `;
        });
      });
      
      container.innerHTML = html;
    }

    function toggleSlot(dayId, timeKey) {
      if (!scheduleData[dayId]) {
        scheduleData[dayId] = { enabled: false, slots: [] };
      }
      const slots = scheduleData[dayId].slots;
      const index = slots.indexOf(timeKey);
      if (index > -1) {
        slots.splice(index, 1);
      } else {
        slots.push(timeKey);
      }
      scheduleData[dayId].enabled = slots.length > 0;
      renderSchedule();
    }

    function toggleAllDays(selectAll) {
      days.forEach(day => {
        if (selectAll) {
          scheduleData[day.id] = { enabled: true, slots: timeSlots.map(t => t.start + '-' + t.end) };
        } else {
          scheduleData[day.id] = { enabled: false, slots: [] };
        }
      });
      renderSchedule();
    }

    function saveSchedule() {
      const doctor = Auth.getCurrentDoctor();
      if (!doctor) return;
      
      const enabledDays = Object.keys(scheduleData)
        .map(Number)
        .filter(d => scheduleData[d].enabled);
      
      const allSlots = [];
      Object.values(scheduleData).forEach(d => {
        d.slots.forEach(s => {
          const [start] = s.split('-');
          if (!allSlots.includes(start)) allSlots.push(start);
        });
      });
      allSlots.sort();
      const startTime = allSlots[0] || '08:00';
      const endTime = allSlots.length > 0 ? (parseInt(allSlots[allSlots.length -1].split(':')[0]) + 1) + ':00' : '17:00';
      
      Storage.updateDoctor(doctor.id, {
        availableDays: enabledDays,
        availableTimeStart: startTime,
        availableTimeEnd: endTime,
        schedules: scheduleData
      });
      
      alert('✅ Lưu lịch làm việc thành công!');
      UI.toast('✅ Lưu lịch làm việc thành công!', 'success');
    }
  </script>
</body>
</html>
