
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ClinicFlow</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" onclick="UI.openSidebar()">☰</button>
      <a href="../../index.html" style="font-size:1.25rem;font-weight:700;color:var(--color-primary)">🏥 ClinicFlow Admin</a>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="btn btn-secondary btn-sm">🌙</button>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Đăng xuất</button>
    </div>
  </div>

  <div class="dashboard-layout">
    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="UI.closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-menu">
        <a href="index.html" class="sidebar-link active">📊 Tổng quan</a>
        <a href="doctors.html" class="sidebar-link">👨‍⚕️ Bác sĩ</a>
        <a href="patients.html" class="sidebar-link">👥 Bệnh nhân</a>
        <a href="appointments.html" class="sidebar-link">📅 Lịch hẹn</a>
      </div>
    </aside>

    <!-- Content -->
    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Tổng quan hệ thống</h1>
        <p>Chào mừng bạn trở lại, Admin!</p>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="card stat-card">
          <div class="stat-value" id="stat-patients">0</div>
          <div class="stat-label">Bệnh nhân</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stat-doctors">0</div>
          <div class="stat-label">Bác sĩ</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stat-appointments">0</div>
          <div class="stat-label">Lịch hẹn</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="stat-today">0</div>
          <div class="stat-label">Hôm nay</div>
        </div>
      </div>

      <!-- Charts Row -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:1.5rem;margin-bottom:1.5rem">
        <div class="card" style="padding:1.5rem">
          <div id="admin-chart-bar"></div>
        </div>
        <div class="card" style="padding:1.5rem">
          <div id="admin-chart-donut"></div>
        </div>
      </div>

      <!-- Recent Appointments -->
      <div class="card" style="margin-bottom:1.5rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h3>Lịch hẹn gần đây</h3>
          <a href="appointments.html" style="font-weight:500;color:var(--color-primary)">Xem tất cả →</a>
        </div>
        <div id="admin-recent-appointments"></div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../../js/utils.js"></script>
  <script src="../../js/core/ui.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/core/auth.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../js/features/charts.js"></script>
  <script src="../../js/features/appointments.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Check Auth
      if (!Auth.isAuthenticated() || Auth.getCurrentUser().role !== 'admin') {
        UI.toast('Bạn không có quyền truy cập', 'error');
        window.location.href = '../login.html';
        return;
      }

      // Seed if needed
      const storedVersion = localStorage.getItem(Storage.KEYS.SEED_VERSION);
      if (storedVersion !== Storage.SEED_VERSION) {
        SeedData.run();
        localStorage.setItem(Storage.KEYS.SEED_VERSION, Storage.SEED_VERSION);
      }

      UI.initTheme();

      // Update Stats
      const patients = Storage.getPatients().length;
      const doctors = Storage.getDoctors().length;
      const appointments = Storage.getAppointments().length;
      const todayAppts = Storage.getAppointments().filter(a => Utils.isSameDay(a.appointmentDate, Utils.getToday()) && a.status !== 'cancelled').length;

      document.getElementById('stat-patients').textContent = patients;
      document.getElementById('stat-doctors').textContent = doctors;
      document.getElementById('stat-appointments').textContent = appointments;
      document.getElementById('stat-today').textContent = todayAppts;

      // Render Charts
      Charts.renderAppointmentChart('admin-chart-bar');
      Charts.renderStatusDonut('admin-chart-donut');

      // Render Recent Appointments
      let recentAppts = Storage.getAppointments().sort((a, b) => b.createdAt.localeCompare(a.createdAt)).slice(0, 5);
      const recentContainer = document.getElementById('admin-recent-appointments');

      if (recentAppts.length === 0) {
        UI.showEmpty('admin-recent-appointments', 'Chưa có lịch hẹn nào', '📅');
      } else {
        const docList = Storage.getDoctors();
        const patList = Storage.getPatients();
        recentContainer.innerHTML = recentAppts.map(appointment => {
          const doctor = docList.find(d => d.id === appointment.doctorId);
          const patient = patList.find(p => p.id === appointment.patientId);
          const statusClass = appointment.status;
          const statusText = { pending: 'Chờ xác nhận', confirmed: 'Đã xác nhận', completed: 'Hoàn thành', cancelled: 'Đã hủy' }[appointment.status];
          return `
            <div class="card" style="margin-bottom:0.75rem;padding:1rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
              <div>
                <div style="font-weight:600">${appointment.appointmentCode} - ${patient ? patient.fullName : '—'} → ${doctor ? doctor.fullName : '—'}</div>
                <div style="font-size:0.875rem;color:var(--text-muted)">${Utils.formatDateShort(appointment.appointmentDate)} - ${appointment.appointmentTime}</div>
              </div>
              <span class="appointment-status status-${statusClass}">${statusText}</span>
            </div>
          `;
        }).join('');
      }

      // Logout
      document.getElementById('logout-btn').addEventListener('click', Auth.logout);
    });
  </script>
</body>
</html>
